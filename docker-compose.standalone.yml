services:
  autonomic-base:
    build:
      context: ..
      dockerfile: agent-benchmarks/docker/Dockerfile.agent
    image: autonomic-benchmarks:latest
    profiles:
      - donotstart

  agent-brain:
    image: autonomic-benchmarks:latest
    volumes:
      - autonomic-workspace:/root/.autonomic
    profiles:
      - agent-brain
    command: ["agent-brain", "serve"]

  agent-spine:
    image: autonomic-benchmarks:latest
    volumes:
      - autonomic-workspace:/root/.autonomic
    profiles:
      - agent-spine
    command: ["agent-spine", "serve"]

  agent-heart:
    image: autonomic-benchmarks:latest
    volumes:
      - autonomic-workspace:/root/.autonomic
    profiles:
      - agent-heart
    command: ["agent-heart", "serve"]

  agent-nerves:
    image: autonomic-benchmarks:latest
    volumes:
      - autonomic-workspace:/root/.autonomic
    profiles:
      - agent-nerves
    command: ["agent-nerves", "serve"]

  agent-muscle:
    image: autonomic-benchmarks:latest
    volumes:
      - autonomic-workspace:/root/.autonomic
    profiles:
      - agent-muscle
    command: ["agent-muscle", "serve"]

  test-runner:
    build:
      context: ..
      dockerfile: agent-benchmarks/docker/Dockerfile.test
    volumes:
      - ./tests:/tests
      - ./benchmarks:/benchmarks
      - ../agent-brain/docs:/tests/docs
      - ../agent-brain/agent-brain/eval:/home/runner/work/agent-brain/agent-brain/agent-brain/eval
    working_dir: /tests
    # To test a standalone agent, you can pass an environment var indicating which one to test
    # e.g., TEST_TARGET=agent-brain
    command: >
      sh -c "pip install -r requirements.txt && pytest standalone/"

volumes:
  autonomic-workspace:
