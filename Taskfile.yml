version: '3'

tasks:
  default:
    cmds:
      - task --list

  build:
    desc: "Build the generic autonomic-base docker image (fetches latest release binaries)"
    cmds:
      - docker-compose -f docker-compose.integration.yml build autonomic-base

  build:sandbox:
    desc: "Build the Docker sandbox image for isolated code execution"
    cmds:
      - docker build -t autonomic-sandbox:latest -f benchmarks/sandbox/Dockerfile.sandbox benchmarks/sandbox/

  # ---------------------------------------------------------------------------
  # Testing
  # ---------------------------------------------------------------------------

  test:smoke:
    desc: "Run CLI binary and config smoke tests"
    cmds:
      - docker-compose -f docker-compose.standalone.yml run --rm test-runner sh -c "pip install -r requirements.txt && pytest standalone/test_smoke.py -v"

  test:standalone:
    desc: "Run all standalone feature tests for every organ"
    cmds:
      - docker-compose -f docker-compose.standalone.yml run --rm test-runner sh -c "pip install -r requirements.txt && pytest standalone/ -v"

  test:standalone:organ:
    desc: "Run standalone tests for a specific organ (e.g., task test:standalone:organ ORGAN=brain)"
    requires:
      vars: [ORGAN]
    cmds:
      - docker-compose -f docker-compose.standalone.yml run --rm test-runner sh -c "pip install -r requirements.txt && pytest standalone/test_{{.ORGAN}}_features.py -v"

  test:edge-cases:
    desc: "Run edge case and boundary condition tests for all organs"
    cmds:
      - docker-compose -f docker-compose.standalone.yml run --rm test-runner sh -c "pip install -r requirements.txt && pytest standalone/test_edge_cases.py -v"

  test:integration:
    desc: "Spin up the full autonomic cluster and run integration tests"
    deps: [clean]
    cmds:
      - docker-compose -f docker-compose.integration.yml up --build --abort-on-container-exit

  # ---------------------------------------------------------------------------
  # Benchmarks
  # ---------------------------------------------------------------------------

  benchmark:stress:
    desc: "Run HTTP stress test against all daemon health endpoints"
    cmds:
      - docker-compose -f docker-compose.integration.yml run --rm test-runner sh -c "pip install -r requirements.txt && python /benchmarks/stress_test.py -c 50 -d 15"

  benchmark:brain:
    desc: "Run agent-brain native benchmark suite (latency, MCP, scale, supervisor, graphify)"
    cmds:
      - docker-compose -f docker-compose.standalone.yml run --rm test-runner sh -c "pip install -r requirements.txt && python /benchmarks/brain_bench.py"

  benchmark:accuracy:
    desc: "Run accuracy evaluations (Recall@3, skills.sh, BEAM, token savings)"
    cmds:
      - docker-compose -f docker-compose.standalone.yml run --rm test-runner sh -c "pip install -r requirements.txt && python /benchmarks/accuracy_eval.py"

  benchmark:model:
    desc: "Run before/after model comparison (requires Ollama; e.g., task benchmark:model MODEL=qwen2.5-coder:7b)"
    vars:
      MODEL: '{{.MODEL | default "qwen2.5-coder:7b"}}'
      PROVIDER: '{{.PROVIDER | default "ollama"}}'
    cmds:
      - python benchmarks/model_comparison.py --model {{.MODEL}} --provider {{.PROVIDER}} --build-sandbox

  benchmark:matrix:
    desc: "Run resource matrix benchmark (tests organs under different RAM/CPU constraints)"
    vars:
      PROFILES: '{{.PROFILES | default ""}}'
      ORGANS: '{{.ORGANS | default ""}}'
    cmds:
      - python benchmarks/resource_matrix.py {{if .PROFILES}}--profiles {{.PROFILES}}{{end}} {{if .ORGANS}}--organs {{.ORGANS}}{{end}}

  benchmark:matrix:quick:
    desc: "Run quick resource matrix (minimal + standard profiles only)"
    cmds:
      - python benchmarks/resource_matrix.py --profiles minimal standard

  benchmark:compare:
    desc: "Run monolith vs autonomic head-to-head comparison at multiple index scales"
    vars:
      SIZES: '{{.SIZES | default "100,500,1000,2000,5000,10000"}}'
    cmds:
      - python benchmarks/monolith_vs_autonomic.py --index-sizes {{.SIZES}} --skip-endurance

  benchmark:endurance:
    desc: "Run 10k-iteration endurance loop (e.g., task benchmark:endurance ITERATIONS=10000)"
    vars:
      ITERATIONS: '{{.ITERATIONS | default "10000"}}'
    cmds:
      - python benchmarks/monolith_vs_autonomic.py --iterations {{.ITERATIONS}} --index-sizes 2000

  benchmark:endurance:gpu:
    desc: "Endurance loop with GPU profiling (requires nvidia-smi)"
    vars:
      ITERATIONS: '{{.ITERATIONS | default "10000"}}'
    cmds:
      - python benchmarks/monolith_vs_autonomic.py --iterations {{.ITERATIONS}} --index-sizes 100,1000,5000,10000 --gpu-profile

  # ---------------------------------------------------------------------------
  # Scorecard
  # ---------------------------------------------------------------------------

  scorecard:
    desc: "Generate the Autonomic AI Scorecard (aggregates all benchmark results)"
    cmds:
      - python benchmarks/scorecard.py

  # ---------------------------------------------------------------------------
  # Full pipeline
  # ---------------------------------------------------------------------------

  all:
    desc: "Run the complete test + benchmark pipeline and generate the scorecard"
    cmds:
      - task: test:smoke
      - task: test:standalone
      - task: test:edge-cases
      - task: test:integration
      - task: benchmark:stress
      - task: benchmark:brain
      - task: benchmark:accuracy
      - task: benchmark:matrix:quick
      - task: scorecard

  # ---------------------------------------------------------------------------
  # Utilities
  # ---------------------------------------------------------------------------

  clean:
    desc: "Tear down all running test containers and remove volumes"
    cmds:
      - docker-compose -f docker-compose.integration.yml down -v || true
      - docker-compose -f docker-compose.standalone.yml down -v || true
