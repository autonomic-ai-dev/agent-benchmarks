version: '3.8'

services:
  nats:
    image: nats:alpine
    command: ["-js", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  autonomic-base:
    build:
      context: ..
      dockerfile: agent-benchmarks/docker/Dockerfile.agent
    image: autonomic-benchmarks:latest
    profiles:
      - donotstart

  agent-body:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["autonomic", "start"]

  agent-brain:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["agent-brain", "serve"]

  agent-spine:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["agent-spine", "serve"]

  agent-heart:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["agent-heart", "serve"]

  agent-nerves:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["agent-nerves", "serve"]

  agent-muscle:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["agent-muscle", "serve"]

  agent-immune:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["agent-immune", "serve"]

  agent-eyes:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["agent-eyes", "serve"]

  agent-mouth:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["agent-mouth", "serve"]

  test-runner:
    image: python:3.11-alpine
    depends_on:
      nats:
        condition: service_healthy
      agent-brain:
        condition: service_started
      agent-heart:
        condition: service_started
    volumes:
      - ./tests:/tests
    working_dir: /tests
    command: >
      sh -c "pip install -r requirements.txt && pytest integration/"

volumes:
  nats-data:
  autonomic-workspace:
