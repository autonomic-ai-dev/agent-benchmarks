services:
  nats:
    image: nats:alpine
    command: ["-js", "--store_dir", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  autonomic-base:
    build:
      context: ..
      dockerfile: agent-benchmarks/docker/Dockerfile.agent
    image: autonomic-benchmarks:latest
    profiles:
      - donotstart


  agent-body:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
      agent-spine:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: ["autonomic", "start"]

  agent-brain:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
      agent-spine:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: ["agent-brain", "grpc", "serve", "--addr", "0.0.0.0:7842"]

  agent-spine:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - autonomic-workspace:/root/.autonomic
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: ["agent-spine", "event", "serve", "--port", "3100"]

  agent-heart:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
      agent-spine:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: ["agent-heart", "serve"]

  agent-nerves:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
      agent-spine:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: ["agent-nerves", "serve"]

  agent-muscle:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
      agent-spine:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: ["agent-muscle", "serve"]

  agent-immune:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
      agent-spine:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: ["agent-immune", "serve"]

  agent-eyes:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
      agent-spine:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: ["agent-eyes", "serve"]

  agent-mouth:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
      agent-spine:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: ["agent-mouth", "serve"]

  test-runner:
    build:
      context: ..
      dockerfile: agent-benchmarks/docker/Dockerfile.test
    depends_on:
      nats:
        condition: service_healthy
      agent-brain:
        condition: service_started
      agent-heart:
        condition: service_started
    volumes:
      - ./tests:/tests
      - ./benchmarks:/benchmarks
      - ./tests/integration-config.toml:/root/.autonomic/config.toml
    working_dir: /tests
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
      - AUTONOMIC_SPINE_URL=http://agent-spine:3100
      - AUTONOMIC_NERVES_NATS_EMBEDDED=false
      - AUTONOMIC_HEART_SCHEDULE_ENABLED=false
    command: >
      sh -c "pip install --break-system-packages -r requirements.txt && pytest integration/"

volumes:
  nats-data:
  autonomic-workspace:
