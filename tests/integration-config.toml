[autonomic.logging]
level = "info"

[eyes.capture]
user_agent = "agent-eyes/0.2.0"

[eyes.logging]
level = "info"

[eyes.server]
port = 3105

[eyes.spine]
url = "http://agent-spine:3100"

[eyes.vlm]
cpu = false
enabled = false
max_new_tokens = 256
model_id = "llava-hf/llava-1.5-7b-hf"
temperature = 0.20000000298023224

[heart.brain]

[heart.finetune]
cron = "0 4 * * *"
enabled = true
memory_threshold_kb = 524288
min_merged_entries = 1
ui_threshold = 1.0

[heart.logging]
level = "info"

[heart.schedule]
cron = "0 3 * * *"
enabled = false

[heart.server]
port = 3101

[heart.spine]
url = "http://agent-spine:3100"

[heart.token_budget]
anomaly_multiplier = 2.5
enabled = true
lookback_days = 7
max_tokens_per_route = 8000
min_samples = 5

[immune.logging]
level = "info"

[immune.nats]
jetstream_consumer = true
url = "nats://nats:4222"

[immune.sandbox]
backend = "subprocess"
network_blackhole = true
seccomp = true

[immune.scanner]
osv_api_url = "https://api.osv.dev/v1"

[immune.server]
port = 3106

[mouth.logging]
level = "info"

[mouth.notifications]
default_webhook = ""

[mouth.server]
port = 3104

[mouth.slack]
approval_channel = ""
signing_secret = ""

[mouth.spine]
url = "http://agent-spine:3100"

[muscle.k8s]
auto_apply = false
enabled = false
gpu_count = 1
gpu_node_selector_key = "accelerator"
gpu_node_selector_value = "nvidia-gpu"
image = "ghcr.io/autonomic-ai-dev/agent-muscle:latest"
job_ttl_seconds = 86400
memory_request = "16Gi"
namespace = "autonomic"
queue_threshold = 1
sync_interval_secs = 60

[muscle.logging]
level = "info"

[muscle.nats]
jetstream_consumer = true
url = "nats://nats:4222"

[muscle.server]
port = 3103

[muscle.spine]
url = "http://agent-spine:3100"

[muscle.train]
data = "./training_data"
epochs = 3
learning_rate = 0.00001
lora_rank = 16
model = "mlx-community/Llama-3.2-3B-Instruct-4bit"
output = "./lora_adapters"

[muscle.worker]
max_concurrent_jobs = 4

[nerves.cluster]
cluster_port = 6222
enabled = false
node_id = "nerves-local"
peers = []

[nerves.filters]
enabled = false

[nerves.logging]
level = "info"

[nerves.nats]
embedded = false
url = "nats://nats:4222"

[nerves.server]
port = 3102

[nerves.spine]
url = "http://agent-spine:3100"
