version: '3.8'

services:
  nats:
    image: nats:alpine
    command: ["-js", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Base image containing all pre-installed organs
  autonomic-base:
    build:
      context: ..
      dockerfile: agent-benchmarks/docker/Dockerfile.agent
    image: autonomic-benchmarks:latest
    profiles:
      - donotstart # We just use this to build the image

  agent-body:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    command: ["autonomic", "start"]

  agent-brain:
    image: autonomic-benchmarks:latest
    depends_on:
      nats:
        condition: service_healthy
    volumes:
      - autonomic-workspace:/root/.autonomic
    environment:
      - AUTONOMIC_NATS_URL=nats://nats:4222
    ports:
      - "3100:3100"
    command: ["agent-brain", "serve"]

volumes:
  nats-data:
  autonomic-workspace:
